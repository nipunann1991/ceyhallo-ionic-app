<!-- Carousel Wrapper -->
<div class="relative w-full aspect-[16/9] md:aspect-[2/1] rounded-2xl overflow-hidden shadow-xl bg-gray-900 group">
  
  <!-- Native Scroll Container -->
  <div 
    #scrollContainer
    (scroll)="onScroll()"
    
    (touchstart)="onInteractionStart()"
    (touchend)="onInteractionEnd()"
    
    (mousedown)="startDrag($event)"
    (mouseleave)="endDrag()"
    (mouseup)="endDrag()"
    (mousemove)="doDrag($event)"
    
    class="flex w-full h-full overflow-x-auto snap-x snap-mandatory scrollbar-hide scroll-smooth cursor-grab active:cursor-grabbing select-none">
    
    @if (banners().length === 0) {
      <!-- Skeleton Loading State -->
      <div class="w-full h-full bg-gray-200 animate-pulse shrink-0"></div>
    }

    @for (bannerItem of banners(); track bannerItem.id; let i = $index) {
      <div 
        class="w-full h-full shrink-0 snap-center relative"
        (click)="onBannerClick(bannerItem)">
        
        <!-- Background Image -->
        <img [src]="bannerItem.image || 'https://i.ibb.co/nNsGtRqn/placeholder-80x80.png'" 
             alt="Banner" 
             class="absolute inset-0 w-full h-full object-cover bg-gray-800 pointer-events-none"
             [style.object-fit]="bannerItem.image ? 'cover' : 'none'" 
             [class.opacity-40]="!bannerItem.image">
        
        <!-- Gradient Overlay -->
        <div class="absolute inset-0 bg-gradient-to-t from-black/95 via-black/40 to-transparent opacity-90 pointer-events-none"></div>

        <!-- Banner Content -->
        <div class="absolute inset-0 p-5 flex flex-col justify-end items-start pointer-events-none">
          
          <!-- Category Badge -->
          <div class="mb-2 transition-all duration-700 transform"
               [class.translate-y-0]="i === activeBannerIndex()"
               [class.opacity-100]="i === activeBannerIndex()"
               [class.translate-y-4]="i !== activeBannerIndex()"
               [class.opacity-0]="i !== activeBannerIndex()">
             <div class="bg-[#B08060]/90 backdrop-blur-sm rounded-full pl-2 pr-3 py-1 flex items-center gap-1.5 shadow-sm">
                <ion-icon name="star" class="text-white/90 text-xs"></ion-icon>
                <span class="text-white text-[0.65rem] font-bold tracking-wider uppercase">{{ bannerItem.category }}</span>
             </div>
          </div>
          
          <!-- Text Content -->
          <div class="w-full relative pr-4 transition-all duration-700 delay-100 transform"
               [class.translate-y-0]="i === activeBannerIndex()"
               [class.opacity-100]="i === activeBannerIndex()"
               [class.translate-y-4]="i !== activeBannerIndex()"
               [class.opacity-0]="i !== activeBannerIndex()">
             <h3 class="text-white text-[1rem] font-bold mb-1.5 leading-tight drop-shadow-md">
               {{ bannerItem.title }}
             </h3>
             
             <p class="text-gray-300 text-[0.8rem] leading-snug line-clamp-2 max-w-[90%] mb-1"
                [innerHTML]="bannerItem.description">
             </p>
          </div>
        </div>
      </div>
    }
  </div>

  <!-- Pagination Dots -->
  @if (banners().length > 1) {
    <div class="absolute bottom-5 right-5 flex items-center gap-1.5 z-20 pointer-events-auto">
       @for (dot of banners(); track dot.id; let i = $index) {
          <button 
            (click)="scrollToBanner(i); $event.stopPropagation()"
            class="h-1.5 rounded-full transition-all duration-300 shadow-sm backdrop-blur-sm" 
            [class]="activeBannerIndex() === i ? 'w-4 bg-white' : 'w-1.5 bg-white/40 hover:bg-white/60'">
          </button>
       }
    </div>
  }

</div>
