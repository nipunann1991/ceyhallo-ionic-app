
<div class="relative w-full bg-white p-3 rounded-[1.2rem] shadow-[0_2px_10px_rgba(0,0,0,0.02)] border border-gray-50 flex gap-3 active:scale-[0.99] transition-transform group">
    <!-- Image Section -->
    <div class="w-[6.5rem] h-[6.5rem] shrink-0 rounded-[1rem] overflow-hidden bg-gray-100 relative">
       <!-- Skeleton Overlay -->
       @if (!isImageLoaded()) {
         <div class="absolute inset-0 bg-gray-200 animate-pulse z-10"></div>
       }
       
       <img [src]="newsItem().imageUrl || 'https://i.ibb.co/nNsGtRqn/placeholder-80x80.png'" 
            (load)="onImageLoad()"
            (error)="handleImgError($event); onImageLoad()" 
            class="w-full h-full object-cover pointer-events-none transition-opacity duration-300" 
            [style.object-fit]="newsItem().imageUrl ? 'cover' : 'none'" 
            [class.opacity-0]="!isImageLoaded()"
            [class.opacity-100]="isImageLoaded()"
            [class.bg-gray-200]="!newsItem().imageUrl" 
            [alt]="newsItem().title">
    </div>

    <!-- Content Section -->
    <div class="flex-1 flex flex-col min-w-0 py-0.5 pr-6"> <!-- pr-6 to avoid overlap with bookmark -->
       
       <!-- Date -->
       <div class="flex items-center justify-between mb-1.5">
         <p class="text-[0.65rem] font-bold text-gray-400 uppercase tracking-wide">{{ newsItem().date | date:'MMM d, y' }}</p>
       </div>
       
       <!-- Title -->
       <h4 class="text-sm font-bold text-[#1A1C1E] leading-[1.35] line-clamp-3 mb-auto">{{ newsItem().title }}</h4>

       <!-- Author -->
       <div class="flex items-center gap-2 mt-2">
          <!-- Author Avatar (Generated from name) -->
          <div class="w-4 h-4 rounded-full bg-gray-200 overflow-hidden shrink-0 border border-gray-100">
             <img [src]="'https://ui-avatars.com/api/?name=' + newsItem().source + '&background=random'" (error)="handleImgError($event)" class="w-full h-full object-cover pointer-events-none">
          </div>
          <span class="text-[0.75rem] font-bold text-gray-500 truncate">{{ newsItem().source }}</span>
       </div>
    </div>

    <!-- Bookmark Icon (Absolute Top Right) -->
    <div class="absolute top-4 right-4 text-gray-300">
        <ion-icon name="bookmark-outline" class="text-xl"></ion-icon>
    </div>
</div>
