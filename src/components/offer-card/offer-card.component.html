
<div class="relative w-full h-[180px] rounded-2xl overflow-hidden shadow-md active:scale-[0.98] transition-transform cursor-pointer group bg-gray-200">
    <!-- Background Image -->
    <img [src]="offer().image || 'https://i.ibb.co/nNsGtRqn/placeholder-80x80.png'" 
         (error)="handleImgError($event)" 
         class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" 
         [class.opacity-80]="!offer().image">
    
    <!-- Gradient Overlay -->
    <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent"></div>

    <!-- Content -->
    <div class="absolute bottom-4 left-4 right-4">
        <!-- Discount/Tag -->
        @if (offer().discount) {
            <div class="inline-block px-2.5 py-1 rounded-lg bg-[#083594] mb-2 shadow-sm backdrop-blur-sm bg-opacity-90">
                <span class="text-[0.75rem] font-bold text-white uppercase tracking-wider">{{ offer().discount }}</span>
            </div>
        }
        
        <!-- Title -->
        <h3 class="text-white text-[1.05rem] font-bold leading-tight line-clamp-2 drop-shadow-md">
            {{ offer().title }}
        </h3>
        <!-- Target Name (Business/Source) -->
        <p class="text-white/90 text-xs font-medium mt-1 truncate drop-shadow-md">{{ offer().targetName }}</p>
    </div>
</div>
