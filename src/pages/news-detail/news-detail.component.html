<!-- Use standard HTML structure with Ionic components -->
@if (article(); as article) {
  <ion-content [fullscreen]="true" class="bg-white">
    
    <!-- Hero Section -->
    <div class="relative w-full h-72">
      <!-- Article Image -->
      <img [src]="article.imageUrl || 'https://i.ibb.co/nNsGtRqn/placeholder-80x80.png'" (error)="handleImgError($event)" [alt]="article.title" class="w-full h-full object-cover" [style.object-fit]="article.imageUrl ? 'cover' : 'none'" [class.bg-gray-200]="!article.imageUrl">
      
      <!-- Gradient Overlay (Top) for readability of icons -->
      <div class="absolute inset-0 bg-gradient-to-b from-black/40 via-transparent to-transparent h-32 pointer-events-none"></div>

      <!-- Navigation Overlay -->
      <div class="absolute top-0 left-0 right-0 nav-overlay-safe px-5 flex justify-between items-start z-10">
        <!-- Back Button -->
        <button (click)="close()" class="text-white hover:opacity-80 transition-opacity active:scale-90">
           <ion-icon name="arrow-back" class="text-[1.75rem] drop-shadow-md"></ion-icon>
        </button>
        
        <!-- Bookmark Button -->
        <button class="text-white hover:opacity-80 transition-opacity active:scale-90">
           <ion-icon name="bookmark-outline" class="text-[1.5rem] drop-shadow-md"></ion-icon>
        </button>
      </div>
    </div>

    <!-- Content Card (Overlapping) -->
    <div class="relative -mt-12 z-10 bg-white rounded-t-[2.5rem] px-6 pt-10 pb-40 min-h-[60vh] shadow-[0_-10px_40px_rgba(0,0,0,0.05)]">
       
       <!-- Category -->
       <div class="flex justify-center mb-1">
         <span class="text-[#083594] font-bold text-[0.75rem] tracking-[0.1em] uppercase">{{ article.category || 'Community' }}</span>
       </div>

       <!-- Title -->
       <h1 class="text-xl font-extrabold text-[#1A1C1E] tracking-tight mb-2 text-center leading-tight">
         {{ article.title }}
       </h1>

       <!-- Author Metadata -->
       <div class="flex items-center justify-center gap-3 mb-5">
          <!-- Author Avatar -->
          <div class="w-7 h-7 rounded-full overflow-hidden border border-gray-100 shadow-sm shrink-0">
             <img [src]="'https://ui-avatars.com/api/?name=' + article.source + '&background=random'" (error)="handleImgError($event)" class="w-full h-full object-cover pointer-events-none">
          </div>
          
          <!-- Text Info -->
          <div class="flex items-center gap-2 text-[0.8rem] font-bold text-gray-500">
             <span class="font-semibold text-xs text-[#1A1C1E]">{{ article.source }}</span>
             <span class="text-gray-300 text-xs">•</span>
             <span class="font-medium text-xs text-gray-500">{{ article.date | date:'MMM d, y' }}</span>
          </div>
       </div>

       <!-- Article Content -->
       <div class="article-content text-sm text-gray-600 leading-relaxed font-normal" [innerHTML]="article.content"></div>
    </div>

  </ion-content>
}

<!-- Sticky Footer Action - Moved outside @if to ensure context is correct -->
<div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 px-5 pt-4 pb-[calc(1.5rem+env(safe-area-inset-bottom))] z-20 shadow-[0_-10px_30px_rgba(0,0,0,0.03)]">
   <button 
      (click)="handleAction()"
      class="w-full h-[3.25rem] bg-[#083594] text-white font-bold text-[0.95rem] rounded-full shadow-lg shadow-[#083594]/20 flex items-center justify-center gap-2.5 active:scale-[0.98] transition-transform">
      <ion-icon [name]="actionIcon" class="text-lg"></ion-icon>
      <span>{{ actionLabel }}</span>
   </button>
</div>
