<ion-tabs>
  <ion-tab-bar class="px-4 border-t border-[#F3F4F6] h-[calc(4rem+env(safe-area-inset-bottom))] shadow-[0_-4px_20px_rgba(0,0,0,0.02)] bg-white" slot="bottom">
    
    <!-- Home (Actual Route - Keeps ion-tab-button) -->
    <!-- We override --color-selected dynamically to gray it out if activeTab is not home -->
    <ion-tab-button 
      tab="home" 
      href="/tabs/home"
      [style.--color-selected]="activeTab() === 'home' ? '#083594' : '#9CA3AF'">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" [class.text-[#9CA3AF]]="activeTab() !== 'home'">
        <path d="M12 18V15" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M10.0703 2.81985L3.14027 8.36985C2.36027 8.9899 1.86027 10.2998 2.03027 11.2798L3.36027 19.2398C3.60027 20.6598 4.96027 21.8098 6.40027 21.8098H17.6003C19.0303 21.8098 20.4003 20.6498 20.6403 19.2398L21.9703 11.2798C22.1303 10.2998 21.6303 8.9899 20.8603 8.36985L13.9303 2.82985C12.8603 1.96985 11.1303 1.96985 10.0703 2.81985Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="text-[0.85rem] font-medium transition-colors duration-300" [class.text-[#9CA3AF]]="activeTab() !== 'home'">Home</span>
    </ion-tab-button>

    <!-- Search (Custom Button) -->
    <div 
      class="flex-1 h-full flex flex-col items-center justify-center cursor-pointer active:scale-95 transition-transform group" 
      (click)="openSearchModal()">
      <svg 
        [class]="activeTab() === 'search' ? 'text-[#083594] -translate-y-[2px]' : 'text-[#9CA3AF] group-hover:text-[#083594]'" 
        class="transition-all duration-300" 
        width="26" height="26" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M21.667 11.9167C21.667 17.3009 17.3012 21.6667 11.917 21.6667C6.53283 21.6667 2.16699 17.3009 2.16699 11.9167C2.16699 6.53258 6.53283 2.16675 11.917 2.16675" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M20.5071 22.414C21.0813 24.1474 22.3921 24.3207 23.3996 22.804C24.3205 21.4174 23.7138 20.2799 22.0455 20.2799C20.8105 20.269 20.1171 21.2332 20.5071 22.414Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M15.167 5.41675H21.667" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M15.167 8.66675H18.417" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span 
        [class]="activeTab() === 'search' ? 'text-[#083594]' : 'text-[#9CA3AF] group-hover:text-[#083594]'"
        class="text-[0.7rem] font-bold mt-[4px] tracking-[0.02em] transition-colors duration-300">
        Search
      </span>
    </div>

    <!-- News (Custom Button) -->
    <div 
      class="flex-1 h-full flex flex-col items-center justify-center cursor-pointer active:scale-95 transition-transform group" 
      (click)="openNewsModal()">
      <svg 
        [class]="activeTab() === 'news' ? 'text-[#083594] -translate-y-[2px]' : 'text-[#9CA3AF] group-hover:text-[#083594]'"
        class="transition-all duration-300" 
        width="26" height="26" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M23.4645 11.31L22.4029 15.8384C21.4929 19.7492 19.6945 21.3309 16.3145 21.0059C15.7729 20.9625 15.1879 20.8651 14.5595 20.7134L12.7395 20.28C8.22204 19.2075 6.82454 16.9759 7.88621 12.4476L8.94788 7.90838C9.16454 6.98755 9.42454 6.18588 9.74954 5.52505C11.017 2.90338 13.1729 2.19922 16.7912 3.05505L18.6004 3.47755C23.1395 4.53922 24.5262 6.78172 23.4645 11.31Z" stroke="currentColor"  stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M16.3149 21.0057C15.6432 21.4607 14.7982 21.8399 13.769 22.1757L12.0574 22.7391C7.75655 24.1257 5.49238 22.9666 4.09488 18.6657L2.70821 14.3866C1.32155 10.0857 2.46988 7.81074 6.77071 6.42407L8.48238 5.86074C8.92655 5.7199 9.34905 5.60074 9.74988 5.5249C9.42488 6.18574 9.16488 6.9874 8.94821 7.90824L7.88655 12.4474C6.82488 16.9757 8.22238 19.2074 12.7399 20.2799L14.5599 20.7132C15.1882 20.8649 15.7732 20.9624 16.3149 21.0057Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span 
        [class]="activeTab() === 'news' ? 'text-[#083594]' : 'text-[#9CA3AF] group-hover:text-[#083594]'"
        class="text-[0.7rem] font-bold mt-[4px] tracking-[0.02em] transition-colors duration-300">
        News
      </span>
    </div>

    <!-- Profile (Custom Button) -->
    <div 
      class="flex-1 h-full flex flex-col items-center justify-center cursor-pointer active:scale-95 transition-transform group" 
      (click)="handleProfileClick()">
      <svg 
        [class]="activeTab() === 'profile' ? 'text-[#083594] -translate-y-[2px]' : 'text-[#9CA3AF] group-hover:text-[#083594]'" 
        class="transition-all duration-300" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12.1596 10.87C12.0596 10.86 11.9396 10.86 11.8296 10.87C9.44957 10.79 7.55957 8.84 7.55957 6.44C7.55957 3.99 9.53957 2 11.9996 2C14.4496 2 16.4396 3.99 16.4396 6.44C16.4296 8.84 14.5396 10.79 12.1596 10.87Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M7.15973 14.56C4.73973 16.18 4.73973 18.82 7.15973 20.43C9.90973 22.27 14.4197 22.27 17.1697 20.43C19.5897 18.81 19.5897 16.17 17.1697 14.56C14.4297 12.73 9.91973 12.73 7.15973 14.56Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span 
        [class]="activeTab() === 'profile' ? 'text-[#083594]' : 'text-[#9CA3AF] group-hover:text-[#083594]'"
        class="text-[0.7rem] font-bold mt-[4px] tracking-[0.02em] transition-colors duration-300">
        Profile
      </span>
    </div>
  </ion-tab-bar>
</ion-tabs>
