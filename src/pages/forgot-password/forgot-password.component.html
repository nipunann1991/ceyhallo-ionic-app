<ion-content [fullscreen]="true">
  <div 
    class="flex flex-col items-center justify-center min-h-full w-full bg-[#F2F4F7] px-6 font-sans text-[#1A1C1E]"
    style="padding-top: calc(6rem + var(--ion-safe-area-top, 0px)); padding-bottom: 2rem;">

    <!-- Logo Section -->
    <div class="flex flex-col items-center mb-8">
       <ion-img src="https://i.ibb.co/B5TnYXWN/logo.png" alt="CeyHallo Logo" class="h-[9rem] object-contain"></ion-img>
      <p class="text-sm font-semibold text-gray-500 mt-1.5">Recover your account</p>
    </div>

    <!-- Main Form Container -->
    <div class="w-full max-w-[21.25rem] animate-slide-in">
        
        <!-- Error Message -->
        @if (errorMessage()) {
          <div class="mb-4 p-3 bg-red-50 text-red-600 text-xs font-bold rounded-lg border border-red-100">
            {{ errorMessage() }}
          </div>
        }

        <!-- Inputs -->
        <div class="space-y-3 mb-6">
            <!-- Email Input -->
            <div class="relative group">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <ion-icon name="mail" class="text-[#9CA3AF] text-[1.125rem] group-focus-within:text-[#083594] transition-colors duration-200"></ion-icon>
                </div>
                <input 
                  type="email" 
                  [value]="email()" 
                  (input)="email.set($any($event.target).value)"
                  class="w-full h-[3rem] pl-[2.75rem] pr-4 bg-white border border-gray-200 rounded-xl text-base font-medium text-[#1A1C1E] placeholder:text-[#9CA3AF] placeholder:font-normal focus:outline-none focus:border-[#083594] focus:ring-4 focus:ring-[#083594]/10 transition-all duration-200 shadow-sm"
                  placeholder="Email Address">
            </div>
        </div>

        <!-- Send Button -->
        <div class="mb-6">
            <button 
                (click)="sendLink()" 
                [disabled]="isLoading()"
                class="w-full h-[2.625rem] bg-[#083594] hover:bg-[#07308a] active:scale-[0.98] text-white font-black text-[0.9rem] tracking-normal rounded-full shadow-[0_4px_12px_rgba(8,53,148,0.15)] flex items-center justify-center transition-all disabled:opacity-70 disabled:cursor-not-allowed">
                @if(isLoading()) { 
                  <ion-spinner name="crescent" color="light" class="w-5 h-5" style="--stroke-width: 8px;"></ion-spinner> 
                } @else { 
                  Send Reset Link 
                }
            </button>
        </div>

        <!-- Back to Login -->
        <div class="text-center">
             <p class="text-sm text-gray-500 font-bold">
                Remember your password? 
                <a routerLink="/login" class="text-[#083594] font-black hover:underline ml-1 cursor-pointer">Login</a>
             </p>
        </div>

    </div>
  </div>
</ion-content>
