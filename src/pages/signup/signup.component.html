<ion-content [fullscreen]="true">
  
  <!-- Close Button (Always visible to allow exit from Auth flow) -->
  <div class="absolute top-4 right-4 z-50">
    <button (click)="close()" class="w-10 h-10 bg-white rounded-full shadow-sm flex items-center justify-center text-gray-500 hover:bg-gray-50 active:scale-95 transition-all">
      <ion-icon name="close" class="text-xl"></ion-icon>
    </button>
  </div>

  <div 
    class="flex flex-col items-center justify-center min-h-full w-full bg-[#F2F4F7] px-6 font-sans text-[#1A1C1E]"
    style="padding-top: calc(4rem + var(--ion-safe-area-top, 0px)); padding-bottom: 2rem;">

    <!-- Logo Section -->
    <div class="flex flex-col items-center mb-6">
       <ion-img src="https://i.ibb.co/B5TnYXWN/logo.png" alt="CeyHallo Logo" class="h-[7rem] object-contain"></ion-img>
      <p class="text-sm font-semibold text-gray-500 mt-1">Join the community</p>
    </div>

    <!-- Main Form Container -->
    <div class="w-full max-w-[21.25rem] animate-slide-in">
        
        <!-- Error Message -->
        @if (errorMessage()) {
          <div class="mb-4 p-3 bg-red-50 text-red-600 text-xs font-bold rounded-lg border border-red-100">
            {{ errorMessage() }}
          </div>
        }

        <!-- Inputs -->
        <div class="space-y-3 mb-6">
            
            <!-- Full Name -->
            <div class="relative group">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <ion-icon name="person" class="text-[#9CA3AF] text-[1.125rem] group-focus-within:text-[#083594] transition-colors duration-200"></ion-icon>
                </div>
                <input 
                  type="text" 
                  [value]="name()" 
                  (input)="name.set($any($event.target).value)"
                  class="w-full h-[3rem] pl-[2.75rem] pr-4 bg-white border border-gray-200 rounded-xl text-base font-medium text-[#1A1C1E] placeholder:text-[#9CA3AF] placeholder:font-normal focus:outline-none focus:border-[#083594] focus:ring-4 focus:ring-[#083594]/10 transition-all duration-200 shadow-sm"
                  placeholder="Full Name">
            </div>

            <!-- Email Input -->
            <div class="relative group">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <ion-icon name="mail" class="text-[#9CA3AF] text-[1.125rem] group-focus-within:text-[#083594] transition-colors duration-200"></ion-icon>
                </div>
                <input 
                  type="email" 
                  [value]="email()" 
                  (input)="email.set($any($event.target).value)"
                  class="w-full h-[3rem] pl-[2.75rem] pr-4 bg-white border border-gray-200 rounded-xl text-base font-medium text-[#1A1C1E] placeholder:text-[#9CA3AF] placeholder:font-normal focus:outline-none focus:border-[#083594] focus:ring-4 focus:ring-[#083594]/10 transition-all duration-200 shadow-sm"
                  placeholder="Email Address">
            </div>

             <!-- Region Select -->
             <div class="relative group">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <ion-icon name="globe" class="text-[#9CA3AF] text-[1.125rem] group-focus-within:text-[#083594] transition-colors duration-200"></ion-icon>
                </div>
                <select 
                  [value]="region()"
                  (change)="region.set($any($event.target).value)"
                  class="w-full h-[3rem] pl-[2.75rem] pr-10 bg-white border border-gray-200 rounded-xl text-base font-medium text-[#1A1C1E] focus:outline-none focus:border-[#083594] focus:ring-4 focus:ring-[#083594]/10 transition-all duration-200 shadow-sm appearance-none"
                  [class.text-[#9CA3AF]]="!region()">
                  <option value="" disabled selected>Select Region</option>
                  @for (country of countries(); track country.id) {
                    <option [value]="country.id" class="text-[#1A1C1E]">{{ country.name }}</option>
                  }
                </select>
                <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-[#9CA3AF]">
                    <ion-icon name="chevron-down"></ion-icon>
                </div>
            </div>

            <!-- Contact Number (Optional) -->
            <div class="relative group">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <ion-icon name="call" class="text-[#9CA3AF] text-[1.125rem] group-focus-within:text-[#083594] transition-colors duration-200"></ion-icon>
                </div>
                <input 
                  type="tel" 
                  [value]="phoneNumber()" 
                  (input)="phoneNumber.set($any($event.target).value)"
                  class="w-full h-[3rem] pl-[2.75rem] pr-4 bg-white border border-gray-200 rounded-xl text-base font-medium text-[#1A1C1E] placeholder:text-[#9CA3AF] placeholder:font-normal focus:outline-none focus:border-[#083594] focus:ring-4 focus:ring-[#083594]/10 transition-all duration-200 shadow-sm"
                  placeholder="Contact Number (Optional)">
            </div>

            <!-- Password Input -->
            <div class="relative group">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <ion-icon name="lock-closed" class="text-[#9CA3AF] text-[1.125rem] group-focus-within:text-[#083594] transition-colors duration-200"></ion-icon>
                </div>
                <input 
                  [type]="passwordFieldType()" 
                  [value]="password()" 
                  (input)="password.set($any($event.target).value)"
                  class="w-full h-[3rem] pl-[2.75rem] pr-[2.75rem] bg-white border border-gray-200 rounded-xl text-base font-medium text-[#1A1C1E] placeholder:text-[#9CA3AF] placeholder:font-normal focus:outline-none focus:border-[#083594] focus:ring-4 focus:ring-[#083594]/10 transition-all duration-200 shadow-sm"
                  placeholder="Password">
                <button 
                  type="button" 
                  (click)="togglePasswordVisibility()" 
                  class="absolute inset-y-0 right-0 pr-4 flex items-center cursor-pointer text-[#9CA3AF] hover:text-[#4B5563] focus:outline-none">
                     <ion-icon [name]="showPassword() ? 'eye-off' : 'eye'" class="text-[1.25rem]"></ion-icon>
                </button>
            </div>

            <!-- Confirm Password Input -->
            <div class="relative group">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <ion-icon name="shield-checkmark" class="text-[#9CA3AF] text-[1.125rem] group-focus-within:text-[#083594] transition-colors duration-200"></ion-icon>
                </div>
                <input 
                  [type]="passwordFieldType()" 
                  [value]="confirmPassword()" 
                  (input)="confirmPassword.set($any($event.target).value)"
                  class="w-full h-[3rem] pl-[2.75rem] pr-[2.75rem] bg-white border border-gray-200 rounded-xl text-base font-medium text-[#1A1C1E] placeholder:text-[#9CA3AF] placeholder:font-normal focus:outline-none focus:border-[#083594] focus:ring-4 focus:ring-[#083594]/10 transition-all duration-200 shadow-sm"
                  placeholder="Confirm Password">
            </div>
        </div>

        <!-- Create Account Button -->
        <div class="mb-3">
            <button 
                (click)="signUp()" 
                [disabled]="isLoading()"
                class="w-full h-[2.625rem] bg-[#083594] hover:bg-[#07308a] active:scale-[0.98] text-white font-black text-[0.9rem] tracking-normal rounded-full shadow-[0_4px_12px_rgba(8,53,148,0.15)] flex items-center justify-center transition-all disabled:opacity-70 disabled:cursor-not-allowed">
                @if(isLoading()) { 
                  <ion-spinner name="crescent" color="light" class="w-5 h-5" style="--stroke-width: 8px;"></ion-spinner> 
                } @else { 
                  Create Account 
                }
            </button>
        </div>

        <!-- Continue as Guest -->
        <div class="text-center mb-6">
            <button (click)="continueAsGuest()" class="inline-flex items-center gap-2 text-sm font-bold text-[#083594] hover:opacity-80 transition-opacity">
                <span>Continue as guest</span>
                <ion-icon name="arrow-forward" class="text-lg"></ion-icon>
            </button>
        </div>

        <!-- OR Divider -->
        <div class="text-center mb-6">
            <span class="text-xs font-black text-gray-400 uppercase tracking-[0.2em]">OR</span>
        </div>

        <!-- Social Buttons (Design Consistency) -->
        <div class="space-y-3 mb-8">
             <!-- Facebook -->
             <button class="w-full py-2 px-6 rounded-full font-bold transition-all duration-200 flex items-center justify-center gap-3 active:scale-[0.98] disabled:opacity-70 disabled:active:scale-100 shadow-sm text-sm tracking-tight h-[2.625rem] bg-[#1877F2] text-white hover:bg-[#166fe5]">
                <ion-icon name="logo-facebook" class="text-base absolute left-6"></ion-icon>
                <span>Sign up with Facebook</span>
             </button>

             <!-- Google -->
             <button class="w-full py-2 px-6 rounded-full font-bold transition-all duration-200 flex items-center justify-center gap-3 active:scale-[0.98] disabled:opacity-70 disabled:active:scale-100 shadow-sm text-sm tracking-tight h-[2.625rem] bg-white border border-gray-200 text-gray-700 hover:bg-gray-50 hover:shadow-sm">
                <svg class="w-4 h-4 absolute left-6" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                  <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                  <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                  <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.21-1.19-2.63z" fill="#FBBC05"/>
                  <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                <span>Sign up with Google</span>
             </button>

             <!-- Apple -->
             <button class="w-full py-2 px-6 rounded-full font-bold transition-all duration-200 flex items-center justify-center gap-3 active:scale-[0.98] disabled:opacity-70 disabled:active:scale-100 shadow-sm text-sm tracking-tight h-[2.625rem] bg-black text-white hover:bg-gray-900">
                <ion-icon name="logo-apple" class="text-lg absolute left-6"></ion-icon>
                <span>Sign up with Apple</span>
             </button>
        </div>

        <!-- Login Link -->
        <div class="text-center mb-4">
             <p class="text-sm text-gray-500 font-bold">
                Already have an account? 
                <a routerLink="/login" class="text-[#083594] font-black hover:underline ml-1 cursor-pointer">Login</a>
             </p>
        </div>

    </div>
  </div>
</ion-content>
