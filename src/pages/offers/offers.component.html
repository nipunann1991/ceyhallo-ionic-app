
<ion-content [fullscreen]="true" class="[--background:#F2F4F7]">
  
  <app-page-header 
    [title]="pageTitle()" 
    [titleSuffix]="pageSuffix()"
    searchPlaceholder="Search offers..."
    [searchValue]="searchTerm()"
    [isModal]="isModalSignal()"
    (searchChange)="handleSearch($event)"
    (back)="goBack()">
  </app-page-header>

  <div class="px-5 pb-8">
    @if (filteredOffers().length > 0) {
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        @for (offer of filteredOffers(); track offer.id) {
          <app-offer-card 
            [offer]="offer"
            class="block h-full w-full"
            (click)="handleOfferClick(offer)">
          </app-offer-card>
        }
      </div>
    } @else {
      <!-- No Results State -->
      <div class="flex flex-col items-center justify-center h-[50vh]">
        <div class="text-center text-gray-400">
          <ion-icon name="pricetags-outline" class="text-7xl mb-2 text-gray-300"></ion-icon>
          <h1 class="text-xl font-bold mt-2">No Offers Found</h1>
          @if (searchTerm()) {
            <p class="text-sm">We couldn't find any offers for "{{ searchTerm() }}".</p>
          } @else {
            <p class="text-sm">Check back later for new deals!</p>
          }
        </div>
      </div>
    }
  </div>

</ion-content>
