<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/profile"></ion-back-button>
    </ion-buttons>
    <ion-title>{{ legalDoc()?.title || 'Terms and Conditions' }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div *ngIf="legalDoc() as doc" [innerHTML]="doc.content"></div>
  <div *ngIf="!legalDoc()">
    <p>Loading...</p>
  </div>
</ion-content>
